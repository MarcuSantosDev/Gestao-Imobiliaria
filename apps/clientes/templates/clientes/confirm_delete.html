{% extends 'base.html' %}

{% block title %}Excluir Cliente - ImobiGest CRM{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h4">Excluir cliente?</h1>
        <p>Deseja excluir <strong>{{ object.nome }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Confirmar exclusão</button>
            <a href="{% url 'clientes:list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
