app = 'gestao-imobiliaria-t6muqg'
primary_region = 'gru'
console_command = '/code/manage.py shell'

[build]

[processes]
app = "gunicorn project.wsgi:application --bind 0.0.0.0:8080 --workers 1"

[deploy]
release_command = "python manage.py migrate --noinput"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ['app']

[[vm]]
memory = '256mb'
cpu_kind = 'shared'
cpus = 1


[[statics]]
guest_path = '/code/static'
url_prefix = '/static/'